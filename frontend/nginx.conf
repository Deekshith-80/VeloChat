server {
    listen 80;

    # 1. Route standard frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Catch frontend API calls and proxy them to the backend container cleanly
    location /api/v1/ {
        proxy_pass http://backend:5500/; # Notice the trailing slash - it strips /api/v1/ automatically!
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Handle Socket.io connections through port 80
    location /socket.io/ {
        proxy_pass http://backend:5500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}